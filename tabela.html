 {k:'bairro',t:'bairro',l:1},{k:'fonte',t:'fonte',l:1,r:d=>'<span class=chip>'+(d.fonte||'')+'</span>'},
 {k:'tipo',t:'tipo',l:1},{k:'area',t:'m²'},{k:'preco',t:'preço',r:d=>'R$ '+br(d.preco)},
 {k:'rs',t:'R$/m²',r:d=>d.rs?br(d.rs):'—'},
 {k:'itbi',t:'ITBI R$/m²',r:d=>d.itbi?br(d.itbi):'—'},{k:'venal',t:'venal R$/m²',r:d=>d.venal?br(d.venal):'—'},
 {k:'premio',t:'prêmio',r:d=>d.premio?d.premio.toFixed(2)+'×':'—'},
 {k:'desc',t:'desc%',r:d=>d.desc==null?'—':'<span class='+(d.desc>0?'pos':'neg')+'>'+d.desc+'%</span>'},
 {k:'qt',t:'qts',r:d=>d.qt??'—'},{k:'and',t:'and',r:d=>d.and??'—'},
 {k:'elev',t:'🛗',r:d=>d.elev?'✓':'·'},{k:'vaga',t:'🚗',r:d=>d.vaga?'✓':'·'},
 {k:'vista',t:'🌅',r:d=>d.vista?'✓':'·'},{k:'ref',t:'🔨',r:d=>d.ref?'✓':'·'},
 {k:'ver',t:'IA',l:1,r:d=>d.ver?'<span class=v-'+d.ver+'>'+d.ver+'</span>':'—'},
 {k:'score',t:'score',r:d=>d.score??'—'},
 {k:'ganho',t:'ganho pot.',r:d=>d.ganho==null?'—':('<span class='+(d.ganho>0?'pos':'neg')+'>R$ '+br(d.ganho)+(d.ganho2?'–'+br(d.ganho2):'')+'</span>')},
 {k:'ini',t:'inserido',l:1,r:d=>d.ini||'—'},{k:'ult',t:'verificado',l:1,r:d=>d.ult||'—'},
 {k:'nv',t:'#ver',r:d=>d.nv??'—'},
 {k:'delta',t:'Δpreço',r:d=>d.delta?('<span class='+(d.delta<0?'pos':'neg')+'>'+(d.delta>0?'+':'')+br(d.delta)+'</span>'):'<span class=dim>0</span>'},
 {k:'ativo',t:'status',l:1,r:d=>d.ativo?'<span class=pos>ativo</span>':'<span class=neg>saiu</span>'},
 {k:'url',t:'link',l:1,r:d=>'<a href="'+d.url+'" target=_blank>↗</a>'},
];
const br=n=>n==null?'':n.toLocaleString('pt-BR');
let sortK='score',sortAsc=false;
const thr=document.querySelector('#t thead tr'), tb=document.querySelector('#t tbody');
COLS.forEach(c=>{const th=document.createElement('th');th.textContent=c.t;if(c.l)th.className='l';th.onclick=()=>{if(sortK===c.k)sortAsc=!sortAsc;else{sortK=c.k;sortAsc=false}render()};thr.appendChild(th)});
[...new Set(DATA.map(d=>d.bairro))].sort().forEach(b=>fb.add(new Option(b,b)));
[...new Set(DATA.map(d=>d.fonte))].sort().forEach(f=>ff.add(new Option(f,f)));
function filtered(){const q=document.getElementById('q').value.toLowerCase(),b=fb.value,f=ff.value,v=fv.value,a=fa.value,p=fp.value;
 const pmin=+document.getElementById('fpmin').value||0,pmax=+document.getElementById('fpmax').value||Infinity;
 let blo=0,bhi=Infinity;if(p){const s=p.split('-');blo=+s[0];bhi=+s[1];}
 const lo=Math.max(pmin,blo),hi=Math.min(pmax,bhi);
 return DATA.filter(d=>{
  if(b&&d.bairro!==b)return false;if(f&&d.fonte!==f)return false;if(v&&d.ver!==v)return false;
  if(a!==''&&d.ativo!=+a)return false;if(d.preco<lo||d.preco>hi)return false;
  if(q&&!((d.bairro+' '+d.fonte+' '+d.tipo+' '+(d.ver||'')).toLowerCase().includes(q)))return false;return true;});}
function render(){let r=filtered();r.sort((x,y)=>{let a=x[sortK],b=y[sortK];a=a==null?-Infinity:a;b=b==null?-Infinity:b;
  if(typeof a==='string')return sortAsc?(''+a).localeCompare(b):(''+b).localeCompare(a);return sortAsc?a-b:b-a;});
 tb.innerHTML=r.map(d=>'<tr'+(d.ativo?'':' class=off')+'>'+COLS.map(c=>'<td'+(c.l?' class=l':'')+'>'+(c.r?c.r(d):(d[c.k]??'—'))+'</td>').join('')+'</tr>').join('');
 document.getElementById('cnt').textContent=r.length+' / '+DATA.length+' imóveis';
 document.getElementById('cnt2').textContent='';}
['q','fb','ff','fv','fa','fp','fpmin','fpmax'].forEach(id=>document.getElementById(id).addEventListener('input',render));
document.getElementById('csv').onclick=()=>{const r=filtered();const head=COLS.map(c=>c.k).join(';');
 const body=r.map(d=>COLS.map(c=>(''+(d[c.k]??'')).replace(/;/g,',')).join(';')).join('\n');
 const blob=new Blob([head+'\n'+body],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='imoveis-poa.csv';a.click();};
render();
</script></div></body></html>
